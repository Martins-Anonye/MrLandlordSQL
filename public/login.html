<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - House Agency</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    form { background-color: #f0f0f0; padding: 2rem; border-radius: 8px; }
    input { display: block; margin: 0.5rem 0; padding: 0.5rem; width: 100%; }
    button { background-color: #0000ff; color: #ffffff; padding: 0.5rem; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <form id="loginForm">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        window.location.href = '/dashboard';
      } else {
        alert(data.error);
      }
    });
  </script>
</body>
</html>
