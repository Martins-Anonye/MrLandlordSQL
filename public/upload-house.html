<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload House - House Agency</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card { background-color: #ffffff; border: 2px solid #DAA520; border-radius: 8px; padding: 1rem; margin: 1rem 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #0000FF; font-weight: bold; }
    input, select, textarea, button { width: 100%; padding: 0.5rem; border: 1px solid #DAA520; border-radius: 4px; }
    button { background-color: #0000FF; color: #ffffff; border: none; cursor: pointer; margin-top: 0.5rem; }
    button:hover { background-color: #DAA520; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload House</h2>
    <button onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    <div class="card">
      <h3>Select Purchased House Slot</h3>
      <select id="slotSelect"></select>
    </div>
    <div class="card">
      <h3>Upload House</h3>
      <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="title">Title:</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label for="description">Description:</label>
          <textarea id="description"></textarea>
        </div>
        <div class="form-group">
          <label for="price">Price:</label>
          <input type="number" id="price" required>
        </div>
        <div class="form-group">
          <label for="location">Location:</label>
          <input type="text" id="location" required>
        </div>
        <h4>Rooms</h4>
        <div class="form-group">
          <label><input type="checkbox" id="bedroom_available" checked> Bedroom</label>
          <div>
            <label><input type="radio" name="bedroom_type" value="select" checked> Select size</label>
            <label><input type="radio" name="bedroom_type" value="custom"> Custom size</label>
          </div>
          <select id="bedroom_size" style="display:block;"></select>
          <input type="text" id="bedroom_custom" placeholder="e.g. 200 sq ft" style="display:none;">
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="living_room_available" checked> Living Room</label>
          <div>
            <label><input type="radio" name="living_room_type" value="select" checked> Select size</label>
            <label><input type="radio" name="living_room_type" value="custom"> Custom size</label>
          </div>
          <select id="living_room_size" style="display:block;"></select>
          <input type="text" id="living_room_custom" placeholder="e.g. 300 sq ft" style="display:none;">
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="kitchen_available" checked> Kitchen</label>
          <div>
            <label><input type="radio" name="kitchen_type" value="select" checked> Select size</label>
            <label><input type="radio" name="kitchen_type" value="custom"> Custom size</label>
          </div>
          <select id="kitchen_size" style="display:block;"></select>
          <input type="text" id="kitchen_custom" placeholder="e.g. 100 sq ft" style="display:none;">
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="bathroom_available" checked> Bathroom</label>
          <div>
            <label><input type="radio" name="bathroom_type" value="select" checked> Select size</label>
            <label><input type="radio" name="bathroom_type" value="custom"> Custom size</label>
          </div>
          <select id="bathroom_size" style="display:block;"></select>
          <input type="text" id="bathroom_custom" placeholder="e.g. 50 sq ft" style="display:none;">
        </div>
        <div class="form-group">
          <label for="lawyer_fee">Lawyer Fee:</label>
          <input type="number" id="lawyer_fee" step="0.01">
        </div>
        <div class="form-group">
          <label for="agent_fee">Agent Fee:</label>
          <input type="number" id="agent_fee" step="0.01">
        </div>
        <div class="form-group">
          <label for="interior_quality">Interior Quality:</label>
          <textarea id="interior_quality"></textarea>
        </div>
        <div class="form-group">
          <label for="exterior_quality">Exterior Quality:</label>
          <textarea id="exterior_quality"></textarea>
        </div>
        <div class="form-group">
          <label for="images">Images:</label>
          <input type="file" id="images" multiple accept="image/*">
        </div>
        <div class="form-group">
          <label for="videos">Videos:</label>
          <input type="file" id="videos" multiple accept="video/*">
        </div>
        <button type="submit">Upload House</button>
      </form>
    </div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    function loadRoomSizes() {
      fetch('/api/houses/room-sizes')
        .then(res => res.json())
        .then(sizes => {
          const selects = ['bedroom_size', 'living_room_size', 'kitchen_size', 'bathroom_size'];
          selects.forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Select Size</option>';
            sizes.forEach(size => {
              const option = document.createElement('option');
              option.value = size.id;
              option.textContent = `${size.name} - ${size.size_text}`;
              select.appendChild(option);
            });
          });
        });
    }

    function toggleSize(selectId, checkbox) {
      const select = document.getElementById(selectId);
      const custom = document.getElementById(selectId.replace('_size', '_custom'));
      const radios = document.querySelectorAll(`input[name="${selectId.replace('_size', '_type')}"]`);
      select.disabled = !checkbox.checked;
      custom.disabled = !checkbox.checked;
      if (!checkbox.checked) {
        select.style.display = 'none';
        custom.style.display = 'none';
        radios.forEach(r => r.disabled = true);
      } else {
        radios.forEach(r => r.disabled = false);
        const checkedRadio = document.querySelector(`input[name="${selectId.replace('_size', '_type')}"]:checked`);
        if (checkedRadio.value === 'select') {
          select.style.display = 'block';
          custom.style.display = 'none';
        } else {
          select.style.display = 'none';
          custom.style.display = 'block';
        }
      }
    }

    function toggleType(radio, room) {
      const select = document.getElementById(`${room}_size`);
      const custom = document.getElementById(`${room}_custom`);
      if (radio.value === 'select') {
        select.style.display = 'block';
        custom.style.display = 'none';
      } else {
        select.style.display = 'none';
        custom.style.display = 'block';
      }
    }

    document.getElementById('bedroom_available').addEventListener('change', (e) => toggleSize('bedroom_size', e.target));
    document.getElementById('living_room_available').addEventListener('change', (e) => toggleSize('living_room_size', e.target));
    document.getElementById('kitchen_available').addEventListener('change', (e) => toggleSize('kitchen_size', e.target));
    document.getElementById('bathroom_available').addEventListener('change', (e) => toggleSize('bathroom_size', e.target));

    document.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const room = e.target.name.replace('_type', '');
        toggleType(e.target, room);
      });
    });

   // /api/houses/my-slots

    function loadSlots() {
      fetch('/api/houses/landlord/purchased-house-slots', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
        .then(res => res.json())
        .then(slots => {
        console.log(slots);
          const select = document.getElementById('slotSelect');
          select.innerHTML = '<option value="">Select Slot</option>';
          //slots.filter(s => s.type === 'house').forEach(slot => {
         slots.forEach(slot => {
            
         const option = document.createElement('option');
            option.value = slot.purchased_slot_id;
            option.textContent = `${slot.slot_title || slot.type} - Purchased: ${new Date(slot.date_purchased).toLocaleDateString()}`;
            select.appendChild(option);
          });
        });
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const slotId = document.getElementById('slotSelect').value;
      if (!slotId) return alert('Select a slot');
      const formData = new FormData();
      formData.append('slot_id', slotId);
      formData.append('title', document.getElementById('title').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('price', document.getElementById('price').value);
      formData.append('location', document.getElementById('location').value);
      const rooms = {};
      const roomTypes = ['bedroom', 'living_room', 'kitchen', 'bathroom'];
      roomTypes.forEach(room => {
        if (document.getElementById(`${room}_available`).checked) {
          const type = document.querySelector(`input[name="${room}_type"]:checked`).value;
          if (type === 'select') {
            rooms[room] = document.getElementById(`${room}_size`).value;
          } else {
            rooms[room] = document.getElementById(`${room}_custom`).value;
          }
        }
      });
      formData.append('rooms', JSON.stringify(rooms));
      formData.append('lawyer_fee', document.getElementById('lawyer_fee').value);
      formData.append('agent_fee', document.getElementById('agent_fee').value);
      formData.append('interior_quality', document.getElementById('interior_quality').value);
      formData.append('exterior_quality', document.getElementById('exterior_quality').value);
      const images = document.getElementById('images').files;
      for (let i = 0; i < images.length; i++) formData.append('images', images[i]);
      const videos = document.getElementById('videos').files;
      for (let i = 0; i < videos.length; i++) formData.append('videos', videos[i]);

      const res = await fetch('/api/houses/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (res.ok) {
        alert(data.message);
        localStorage.setItem('lastHouseId', data.houseId);
        window.location.href = '/amenities'; // Redirect to amenities page
      } else {
        alert(data.error || data.message);
      }
    });

    loadSlots();
    loadRoomSizes();
  </script>
</body>
</html>
