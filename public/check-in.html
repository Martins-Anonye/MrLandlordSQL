<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-ins - House Agency</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card { background-color: #ffffff; border: 2px solid #DAA520; border-radius: 8px; padding: 1rem; margin: 1rem 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #DAA520; padding: 0.5rem; text-align: left; }
    th { background-color: #f0f0f0; color: #0000FF; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Check-ins</h2>
    <button onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    <div class="card">
      <h3>Check-ins on Your Houses</h3>
      <table id="checkinsTable">
        <thead>
          <tr><th>User</th><th>House</th><th>Time</th><th>Image</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    function loadCheckins() {
      fetch('/api/admin/checkins', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
        .then(res => res.json())
        .then(checkins => {
          const tbody = document.querySelector('#checkinsTable tbody');
          tbody.innerHTML = '';
          checkins.forEach(c => {
            const row = `<tr><td>${c.user_email}</td><td>${c.house_title}</td><td>${new Date(c.created_at).toLocaleString()}</td><td>${c.image ? `<img src="/${c.image}" width="50">` : 'No image'}</td></tr>`;
            tbody.innerHTML += row;
          });
        });
    }

    loadCheckins();
  </script>
</body>
</html>
