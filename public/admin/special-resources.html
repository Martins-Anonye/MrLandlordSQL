<div class="card">
  <h3>Special Resources Management</h3>
  <div id="categoriesContainer"></div>
</div>

<style>
  .category-section {
    border: 1px solid #DAA520;
    border-radius: 4px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .category-header {
    background-color: #f0f0f0;
    padding: 0.75rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    color: #0000FF;
  }
  .category-header:hover {
    background-color: #e0e0e0;
  }
  .category-toggle {
    font-size: 1.2rem;
    transition: transform 0.3s ease;
  }
  .category-toggle.open {
    transform: rotate(90deg);
  }
  .category-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .category-content.open {
    max-height: 500px;
    padding: 1rem;
  }
  .addItemForm {
    margin-bottom: 1rem;
  }
  .addItemForm input {
    width: auto;
    display: inline-block;
    margin-right: 0.5rem;
  }
  .addItemForm button {
    width: auto;
    display: inline-block;
    margin-top: 0;
  }
  .category-content ul {
    list-style: none;
    padding: 0;
  }
  .category-content li {
    padding: 0.5rem;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .category-content li button {
    width: auto;
    padding: 0.3rem 0.6rem;
    font-size: 0.85rem;
    margin-top: 0;
  }
</style>

<script>
  const token = localStorage.getItem('token');

  // Load categories and items
  function loadCategories() {
    const token = localStorage.getItem('token');
    fetch('/api/admin/categories', {
      headers: { 'Authorization': `Bearer ${token}` }
    })
      .then(res => {
        if (!res.ok) throw new Error(`Load categories failed: ${res.status}`);
        return res.json();
      })
      .then(categories => {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '';
          if (categories && Array.isArray(categories)) {
        categories.forEach(cat => {
          // Create collapsible section
          const catDiv = document.createElement('div');
          catDiv.className = 'category-section';
          const header = document.createElement('div');
          header.className = 'category-header';
          header.innerHTML = `<span>${cat.name}</span><span class="category-toggle">▶</span>`;
          const content = document.createElement('div');
          content.className = 'category-content';
          content.innerHTML = `<form class="addItemForm" data-cat-id="${cat.id}">
              <input type="text" placeholder="New item name" required>
              <button type="submit">Add Item</button>
            </form>
            <ul>`;
          cat.items.forEach(item => {
            content.innerHTML += `<li><span>${item.name}</span> <button onclick="deleteItem(${cat.id}, ${item.id})">Delete</button></li>`;
          });
          content.innerHTML += `</ul>`;
          // toggle functionality
          header.addEventListener('click', () => {
            const toggle = header.querySelector('.category-toggle');
            content.classList.toggle('open');
            toggle.classList.toggle('open');
          });
          catDiv.appendChild(header);
          catDiv.appendChild(content);
          container.appendChild(catDiv);
        });
          }

        // Add event listeners for add item forms
        document.querySelectorAll('.addItemForm').forEach(form => {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const catId = e.target.dataset.catId;
            const name = e.target.querySelector('input').value;
            const res = await fetch(`/api/admin/categories/${catId}/items`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              body: JSON.stringify({ name })
            });
            const data = await res.json();
            alert(data.message);
            if (res.ok) {
              e.target.reset();
              loadCategories();
            }
          });
        });
      })
      .catch(err => console.error('Error loading categories:', err));
  }
  loadCategories();

  // Delete item
  window.deleteItem = async (catId, itemId) => {
    if (confirm('Delete item?')) {
      const token = localStorage.getItem('token');
      const res = await fetch(`/api/admin/categories/${catId}/items/${itemId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      loadCategories();
    }
  };
</script>
